<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashCare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <script src="/js/sdkClient.js" defer></script>
    <script src="/js/app.js" defer></script>
</head>
<body>
<div class="bg-grid"></div>

<div class="shell">
    <section id="auth-section">
        <div class="hero">
            <div>
                <div class="badge">Финансы под контролем</div>
                <h1 class="hero-title">Добро пожаловать в <span>CashCare</span></h1>
                <p class="hero-text">
                    Зарегистрируйся за минуту, войди по JWT и посмотри свой профиль.
                    Всё уже подключено к бэкенду — можно жать кнопки и смотреть ответы API.
                </p>
                <div class="feature-list">
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="tabs">
                        <button type="button" class="tab-btn active" data-tab="login">Вход</button>
                        <button type="button" class="tab-btn" data-tab="register">Регистрация</button>
                    </div>
                </div>

                <div class="card-body">
                    <form id="login-form" class="form-panel active">
                        <div class="field-grid">
                            <div>
                                <label for="login-input">Email или username</label>
                                <input id="login-input" type="text" placeholder="user@mail.com" autocomplete="username" required>
                            </div>
                            <div>
                                <label for="login-password">Пароль</label>
                                <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required>
                            </div>
                        </div>
                        <button id="login-btn" type="submit" class="btn btn-primary">Войти</button>
                        <div id="login-alert" class="alert"></div>
                    </form>

                    <form id="register-form" class="form-panel">
                        <div class="field-grid two-col">
                            <div>
                                <label for="reg-first-name">Имя</label>
                                <input id="reg-first-name" type="text" placeholder="Иван" required>
                            </div>
                            <div>
                                <label for="reg-last-name">Фамилия</label>
                                <input id="reg-last-name" type="text" placeholder="Иванов" required>
                            </div>
                            <div>
                                <label for="reg-username">Username</label>
                                <input id="reg-username" type="text" placeholder="ivan_care" required>
                            </div>
                            <div>
                                <label for="reg-email">Email</label>
                                <input id="reg-email" type="email" placeholder="ivan@mail.com" required>
                            </div>
                            <div>
                                <label for="reg-age">Возраст</label>
                                <input id="reg-age" type="number" min="18" value="18" required>
                            </div>
                            <div>
                                <label for="reg-gender">Пол</label>
                                <select id="reg-gender" required>
                                    <option value="MALE">Мужской</option>
                                    <option value="FEMALE">Женский</option>
                                </select>
                            </div>
                            <div style="grid-column: 1 / -1;">
                                <label for="reg-password">Пароль</label>
                                <input id="reg-password" type="password" placeholder="минимум 6 символов" autocomplete="new-password" required>
                            </div>
                        </div>
                        <button id="register-btn" type="submit" class="btn btn-primary">Создать аккаунт</button>
                        <div id="register-alert" class="alert"></div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section id="dashboard-section" class="dashboard">
        <div class="dashboard-top">
            <div>
                <h2 class="dashboard-title">Твой профиль</h2>
                <p class="dashboard-subtitle">Данные загружены с `/api/auth/me`</p>
            </div>
            <button id="logout-btn" type="button" class="btn btn-ghost">Выйти</button>
        </div>

        <div class="card">
            <div class="card-body">
                <div id="profile-alert" class="alert"></div>
                <div class="profile-grid">
                    <div class="stat-card">
                        <div class="stat-label">Имя</div>
                        <div class="stat-value" id="profile-first-name">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Фамилия</div>
                        <div class="stat-value" id="profile-last-name">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Username</div>
                        <div class="stat-value" id="profile-username">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Email</div>
                        <div class="stat-value" id="profile-email">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Возраст</div>
                        <div class="stat-value" id="profile-age">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Пол</div>
                        <div class="stat-value" id="profile-gender">—</div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
